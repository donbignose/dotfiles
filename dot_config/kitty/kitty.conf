# ╔══════════════════════════════════════════════════════════════╗
# ║                    Kitty Config                            ║
# ║                  Kanagawa Wave Theme                       ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Font ─────────────────────────────────────────────────────
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ── Window ───────────────────────────────────────────────────
background_opacity 0.85
window_padding_width 4
confirm_os_window_close 0
enable_audio_bell no
hide_window_decorations yes

# ── Scrollback ───────────────────────────────────────────────
scrollback_lines 10000

# ── Cursor ───────────────────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5

# ── Mouse ────────────────────────────────────────────────────
copy_on_select clipboard
mouse_map middle release ungrabbed paste_from_clipboard

# ── Tab Bar ──────────────────────────────────────────────────
tab_bar_style fade
tab_fade 0.25 0.5 0.75 1
active_tab_foreground   #DCD7BA
active_tab_background   #2A2A37
active_tab_font_style   bold
inactive_tab_foreground #727169
inactive_tab_background #1F1F28
inactive_tab_font_style normal

# ── Kanagawa Wave Colors ─────────────────────────────────────

# Background / Foreground
foreground #DCD7BA
background #1F1F28

# Selection
selection_foreground #DCD7BA
selection_background #2D4F67

# Cursor
cursor #C8C093
cursor_text_color #1F1F28

# URL
url_color #98BB6C

# Normal colors
color0  #16161D
color1  #C34043
color2  #76946A
color3  #C0A36E
color4  #7E9CD8
color5  #957FB8
color6  #6A9589
color7  #C8C093

# Bright colors
color8  #727169
color9  #E82424
color10 #98BB6C
color11 #E6C384
color12 #7FB4CA
color13 #938AA9
color14 #7AA89F
color15 #DCD7BA

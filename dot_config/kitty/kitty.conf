# ╔══════════════════════════════════════════════════════════════╗
# ║                    Kitty Config                            ║
# ║                  Everforest Dark Theme                     ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Font ─────────────────────────────────────────────────────
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ── Window ───────────────────────────────────────────────────
background_opacity 0.85
window_padding_width 4
confirm_os_window_close 0
enable_audio_bell no
visual_bell_duration 0.1
command_on_bell notify-send -a "kitty" "Terminal Bell" "A process needs your attention"
hide_window_decorations yes

# ── Scrollback ───────────────────────────────────────────────
scrollback_lines 10000

# ── Cursor ───────────────────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0.5

# ── Mouse ────────────────────────────────────────────────────
copy_on_select clipboard
mouse_map middle release ungrabbed paste_from_clipboard

# ── Tab Bar ──────────────────────────────────────────────────
tab_bar_style fade
tab_fade 0.25 0.5 0.75 1
active_tab_foreground   #D3C6AA
active_tab_background   #343F44
active_tab_font_style   bold
inactive_tab_foreground #7A8478
inactive_tab_background #2D353B
inactive_tab_font_style normal

# ── Everforest Dark Colors ─────────────────────────────────────

# Background / Foreground
foreground #D3C6AA
background #2D353B

# Selection
selection_foreground #D3C6AA
selection_background #425047

# Cursor
cursor #9DA9A0
cursor_text_color #2D353B

# URL
url_color #A7C080

# Normal colors
color0  #232A2E
color1  #E67E80
color2  #A7C080
color3  #DBBC7F
color4  #7FBBB3
color5  #D699B6
color6  #83C092
color7  #9DA9A0

# Bright colors
color8  #7A8478
color9  #E67E80
color10 #A7C080
color11 #DBBC7F
color12 #7FBBB3
color13 #D699B6
color14 #83C092
color15 #D3C6AA

# Starship Prompt — Everforest Dark

format = """
[](#A7C080)\
$os\
[](bg:#D699B6 fg:#A7C080)\
$directory\
[](bg:#83C092 fg:#D699B6)\
$git_branch\
$git_status\
[](bg:#DBBC7F fg:#83C092)\
$nodejs\
$python\
$rust\
$golang\
[](bg:#7FBBB3 fg:#DBBC7F)\
$cmd_duration\
[](fg:#7FBBB3)\
$line_break\
$character"""

[os]
disabled = false
style = "bg:#A7C080 fg:#2D353B"

[os.symbols]
Arch = "󰣇 "
Ubuntu = " "
Fedora = " "
Macos = " "
Linux = " "
Windows = "󰍲 "

[directory]
style = "bg:#D699B6 fg:#2D353B"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
style = "bg:#83C092 fg:#2D353B"
format = "[ $symbol$branch ]($style)"
symbol = " "

[git_status]
style = "bg:#83C092 fg:#2D353B"
format = "[$all_status$ahead_behind ]($style)"

[nodejs]
style = "bg:#DBBC7F fg:#2D353B"
format = "[ $symbol($version) ]($style)"
symbol = " "

[python]
style = "bg:#DBBC7F fg:#2D353B"
format = "[ $symbol($version) ]($style)"
symbol = " "

[rust]
style = "bg:#DBBC7F fg:#2D353B"
format = "[ $symbol($version) ]($style)"
symbol = "🦀 "

[golang]
style = "bg:#DBBC7F fg:#2D353B"
format = "[ $symbol($version) ]($style)"
symbol = " "

[cmd_duration]
style = "bg:#7FBBB3 fg:#2D353B"
format = "[ 󰔛 $duration ]($style)"
min_time = 2_000

[character]
success_symbol = "[❯](bold #A7C080)"
error_symbol = "[❯](bold #E67E80)"

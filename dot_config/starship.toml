# Starship Prompt — Everforest Dark (Powerline)

format = """\
[](fg:#A7C080)\
$os\
[](bg:#343F44 fg:#A7C080)\
$directory\
[](bg:#475258 fg:#343F44)\
$git_branch\
$git_status\
[](fg:#475258)\
$character"""

right_format = """\
[](fg:#475258)\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
[](bg:#343F44 fg:#475258)\
$cmd_duration\
[](bg:#A7C080 fg:#343F44)\
$time\
[](fg:#A7C080)"""

[os]
disabled = false
style = "bg:#A7C080 fg:#2D353B bold"

[os.symbols]
Arch = "󰣇 "
Ubuntu = " "
Fedora = " "
Macos = " "
Linux = " "
Windows = "󰍲 "

[directory]
style = "bg:#343F44 fg:#D3C6AA"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Workspace" = "󰲋 "
"Pictures" = " "
"Music" = "󰝚 "

[git_branch]
style = "bg:#475258 fg:#A7C080"
format = "[  $branch ]($style)"

[git_status]
style = "bg:#475258 fg:#D3C6AA"
format = "[$all_status$ahead_behind]($style)"
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
modified = "! "
staged = "+ "
untracked = "? "
deleted = "✘ "

[nodejs]
style = "bg:#475258 fg:#A7C080"
format = "[ $symbol$version ]($style)"
symbol = " "
detect_files = ["package.json", ".node-version"]

[python]
style = "bg:#475258 fg:#DBBC7F"
format = "[ $symbol$version ]($style)"
symbol = " "

[rust]
style = "bg:#475258 fg:#E69875"
format = "[ $symbol$version ]($style)"
symbol = " "

[golang]
style = "bg:#475258 fg:#7FBBB3"
format = "[ $symbol$version ]($style)"
symbol = " "

[docker_context]
style = "bg:#475258 fg:#7FBBB3"
format = "[ $symbol$context ]($style)"
symbol = "󰡨 "
only_with_files = true

[cmd_duration]
style = "bg:#343F44 fg:#7A8478"
format = "[ 󰔛 $duration ]($style)"
min_time = 1_000

[time]
disabled = false
style = "bg:#A7C080 fg:#2D353B bold"
format = "[ $time ]($style)"
time_format = "%H:%M"

[character]
success_symbol = "[](bold #A7C080)"
error_symbol = "[](bold #E67E80)"
vimcmd_symbol = "[](bold #7FBBB3)"

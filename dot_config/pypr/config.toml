[pyprland]
plugins = ["scratchpads", "expose"]

[scratchpads.term]
command = "ghostty --class=scratchpad"
class = "scratchpad"
animation = "fromTop"
size = "75% 60%"

[scratchpads.volume]
command = "pavucontrol"
class = "org.pulseaudio.pavucontrol"
animation = "fromRight"
size = "40% 90%"
lazy = true

[scratchpads.btop]
command = "ghostty --class=btop-scratchpad -e btop"
class = "btop-scratchpad"
animation = "fromTop"
size = "80% 70%"
lazy = true

[scratchpads.sql]
command = "ghostty --class=lazysql-scratchpad -e lazysql"
class = "lazysql-scratchpad"
animation = "fromBottom"
size = "80% 70%"
lazy = true

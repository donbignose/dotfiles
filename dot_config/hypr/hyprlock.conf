# Hyprlock — lock screen
# Everforest Dark theme

background {
    monitor =
    path = ~/Pictures/wallpaper.png
    blur_passes = 3
    blur_size = 6
    contrast = 0.9
    brightness = 0.6
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.26
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(A7C080)
    inner_color = rgb(2D353B)
    font_color = rgb(D3C6AA)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(D3C6AA)
    font_size = 64
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

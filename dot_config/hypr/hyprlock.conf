# Hyprlock — lock screen
# Kanagawa Wave theme

background {
    monitor =
    path = ~/Pictures/wallpaper.jpg
    blur_passes = 3
    blur_size = 6
    contrast = 0.9
    brightness = 0.6
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.26
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(7E9CD8)
    inner_color = rgb(1F1F28)
    font_color = rgb(DCD7BA)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(DCD7BA)
    font_size = 64
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

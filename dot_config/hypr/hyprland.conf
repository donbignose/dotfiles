# ╔══════════════════════════════════════════════════════════════╗
# ║                    Hyprland Config                         ║
# ║                  Everforest Dark Theme                     ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Monitor ──────────────────────────────────────────────────
# 4K scaled to effective 2560x1440. Adjust scale if needed (1.25, 1.5, 1.75)
monitor = , preferred, auto, 1.5

# ── Autostart ────────────────────────────────────────────────
exec-once = waybar
exec-once = swww-daemon && swww img ~/Pictures/Wallpapers/cozy-campfire.gif
exec-once = hypridle
exec-once = swaync
exec-once = hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swayosd-server
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Colloid-Green-Dark-Everforest'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Everforest-Dark'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'everforest-cursors'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface font-name 'JetBrains Mono Nerd Font 10'
exec-once = pypr

# Startup apps
exec-once = [workspace 2 silent] zen-browser
exec-once = [workspace 5 silent] thunderbird

# ── Input ────────────────────────────────────────────────────
input {
    kb_layout = ch
    kb_variant = de
    kb_options = caps:swapescape

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# ── General ──────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    col.active_border = rgb(A7C080)
    col.inactive_border = rgb(475258)

    layout = dwindle
}

# ── Decoration ───────────────────────────────────────────────
decoration {
    rounding = 5

    blur {
        enabled = true
        size = 5
        passes = 2
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(232A2Eee)
    }
}

# ── Animations ───────────────────────────────────────────────
animations {
    enabled = true

    # Curves
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = smooth, 0.37, 0, 0.63, 1

    # Windows
    animation = windowsIn, 1, 5, winIn, popin 60%
    animation = windowsOut, 1, 5, winOut, popin 60%
    animation = windowsMove, 1, 4, wind, slide

    # Fade
    animation = fade, 1, 5, smooth
    animation = fadeIn, 1, 4, smooth
    animation = fadeOut, 1, 3, smooth

    # Layers (waybar, fuzzel, wlogout, etc.)
    animation = layers, 1, 4, wind, slide
    animation = layersIn, 1, 4, winIn, fade
    animation = layersOut, 1, 3, winOut, fade

    # Workspaces
    animation = workspaces, 1, 5, wind, slide
    animation = specialWorkspace, 1, 4, winIn, slidevert

    # Border color transition
    animation = border, 1, 10, liner
    animation = borderangle, 1, 30, liner, loop
}

# ── Layout ───────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Cursor ───────────────────────────────────────────────────
cursor {
    no_hardware_cursors = true
}

env = XCURSOR_THEME,everforest-cursors
env = XCURSOR_SIZE,24

# ── Misc ─────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ── Variables ────────────────────────────────────────────────
$mod = SUPER
$term = kitty
$browser = zen-browser
$menu = rofi -show drun

# ── Keybindings ──────────────────────────────────────────────

# Applications
bind = $mod, Return, exec, $term
bind = $mod, D, exec, $menu
bind = $mod, V, exec, cliphist list | rofi -dmenu -p "󰅍" | cliphist decode | wl-copy
bind = $mod SHIFT, Q, killactive

# Session
bind = $mod SHIFT, E, exit
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod, X, exec, $HOME/.local/bin/power-menu
bind = $mod, Escape, exec, hyprlock
bind = $mod SHIFT, W, exec, $HOME/.local/bin/wallpaper-menu
bind = $mod, N, exec, swaync-client -t -sw

# Focus (vim keys)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Focus (arrow keys)
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Cycle workspaces
bind = $mod CONTROL, Right, workspace, e+1
bind = $mod CONTROL, Left, workspace, e-1

# Layout
bind = $mod, B, togglesplit
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, Space, togglefloating
bind = $mod, Space, cyclenext  # cycle focus

# Scratchpads (pyprland)
bind = $mod, Minus, exec, pypr toggle term
bind = $mod SHIFT, Minus, exec, pypr toggle btop
bind = $mod SHIFT, V, exec, pypr toggle volume

# Expose (pyprland)
bind = $mod, Tab, exec, pypr expose

# Resize (submap)
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -20 0
binde = , J, resizeactive, 0 20
binde = , K, resizeactive, 0 -20
binde = , L, resizeactive, 20 0
binde = , Left, resizeactive, -20 0
binde = , Down, resizeactive, 0 20
binde = , Up, resizeactive, 0 -20
binde = , Right, resizeactive, 20 0
bind = , Escape, submap, reset
bind = , Return, submap, reset
submap = reset

# Screenshot & recording menu
bind = $mod SHIFT, P, exec, $HOME/.local/bin/screenshot-menu

# Volume (with OSD popup)
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Brightness (with OSD popup)
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Layer Rules ──────────────────────────────────────────────
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar
layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0.3, match:namespace logout_dialog

# ── Window Rules ─────────────────────────────────────────────
windowrule = float on, match:class org.gnome.Calculator
windowrule = float on, match:class pavucontrol
windowrule = float on, match:title System Settings

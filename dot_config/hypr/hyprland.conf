# ╔══════════════════════════════════════════════════════════════╗
# ║                    Hyprland Config                         ║
# ║                  Kanagawa Wave Theme                       ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Monitor ──────────────────────────────────────────────────
# 4K scaled to effective 2560x1440. Adjust scale if needed (1.25, 1.5, 1.75)
monitor = , preferred, auto, 1.5

# ── Autostart ────────────────────────────────────────────────
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = dunst
exec-once = hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swayosd-server

# Startup apps
exec-once = [workspace 2 silent] zen-browser
exec-once = [workspace 5 silent] thunderbird

# ── Input ────────────────────────────────────────────────────
input {
    kb_layout = ch
    kb_variant = de
    kb_options = caps:swapescape

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# ── General ──────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    col.active_border = rgb(98BB6C)
    col.inactive_border = rgb(54546D)

    layout = dwindle
}

# ── Decoration ───────────────────────────────────────────────
decoration {
    rounding = 5

    blur {
        enabled = true
        size = 5
        passes = 2
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(16161Dee)
    }
}

# ── Animations ───────────────────────────────────────────────
animations {
    enabled = true

    bezier = ease, 0.25, 0.1, 0.25, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    animation = windows, 1, 4, overshot, slide
    animation = windowsOut, 1, 4, ease, slide
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, ease, slide
}

# ── Layout ───────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Misc ─────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ── Variables ────────────────────────────────────────────────
$mod = SUPER
$term = kitty
$browser = zen-browser
$menu = fuzzel

# ── Keybindings ──────────────────────────────────────────────

# Applications
bind = $mod, Return, exec, $term
bind = $mod, D, exec, $menu
bind = $mod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, Q, killactive

# Session
bind = $mod SHIFT, E, exit
bind = $mod SHIFT, C, exec, hyprctl reload

# Focus (vim keys)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Focus (arrow keys)
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Cycle workspaces
bind = $mod CONTROL, Right, workspace, e+1
bind = $mod CONTROL, Left, workspace, e-1

# Layout
bind = $mod, B, togglesplit
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, Space, togglefloating
bind = $mod, Space, cyclenext  # cycle focus

# Scratchpad
bind = $mod SHIFT, Minus, movetoworkspacesilent, special
bind = $mod, Minus, togglespecialworkspace

# Resize (submap)
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -20 0
binde = , J, resizeactive, 0 20
binde = , K, resizeactive, 0 -20
binde = , L, resizeactive, 20 0
binde = , Left, resizeactive, -20 0
binde = , Down, resizeactive, 0 20
binde = , Up, resizeactive, 0 -20
binde = , Right, resizeactive, 20 0
bind = , Escape, submap, reset
bind = , Return, submap, reset
submap = reset

# Screenshot (grimblast)
bind = $mod SHIFT, P, submap, screenshot
submap = screenshot
bind = , 1, exec, grimblast --freeze save area
bind = , 1, submap, reset
bind = , 2, exec, grimblast save output
bind = , 2, submap, reset
bind = , 3, exec, grimblast --freeze copy area
bind = , 3, submap, reset
bind = , 4, exec, grimblast copy output
bind = , 4, submap, reset
bind = , 5, exec, grimblast --freeze save active
bind = , 5, submap, reset
bind = , Escape, submap, reset
submap = reset

# Volume (with OSD popup)
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Brightness (with OSD popup)
binde = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Window Rules ─────────────────────────────────────────────
windowrule = float on, match:class org.gnome.Calculator
windowrule = float on, match:class pavucontrol
windowrule = float on, match:title System Settings

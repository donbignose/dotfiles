# Pane/window indexing from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "screen-256color"
set-option -sa terminal-features ',kitty:RGB'

setw -g mouse on
unbind %
bind | split-window -h

unbind '"'
bind - split-window -v
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -t:.+'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'C-Space' select-pane -t:.+

# prefix + M: open edit layout in current window (nvim left, shell right)
bind M split-window -h -p 35 -c "#{pane_current_path}" \; \
       select-pane -L \; \
       send-keys "nvim" Enter

# ── Kanagawa Wave Status Line ────────────────────────────────
set -g status-style "bg=#1F1F28,fg=#DCD7BA"
set -g status-left "#[bg=#7E9CD8,fg=#1F1F28,bold] #S #[bg=#1F1F28,fg=#7E9CD8]"
set -g status-right "#[fg=#54546D]│ #[fg=#76946A]%H:%M #[fg=#54546D]│ #[fg=#957FB8]%d-%b-%Y "
set -g status-left-length 30
set -g status-right-length 50

setw -g window-status-format "#[fg=#727169] #I:#W "
setw -g window-status-current-format "#[bg=#2A2A37,fg=#7E9CD8,bold] #I:#W "
setw -g window-status-separator ""

set -g pane-border-style "fg=#54546D"
set -g pane-active-border-style "fg=#7E9CD8"
set -g message-style "bg=#2A2A37,fg=#DCD7BA"

# ── Plugins ──────────────────────────────────────────────────
set -g @plugin 'feqzz/tmux-spotify-info'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
